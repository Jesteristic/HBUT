<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>爬虫控制台</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border:1px solid #ccc; padding:4px; }
  </style>
</head>
<body>
<div id="app">
  <h1>爬虫控制台</h1>
  <form @submit.prevent="submitTask">
     <label>关键词：<input v-model="task.keyword" required/></label>
     <label>页大小：<input type="number" v-model.number="task.page_size" required/></label>
     <label>页数：<input type="number" v-model.number="task.pages" required/></label>
     <button>提交任务</button>
  </form>
  <hr/>
  <h2>队列 & 线程状态</h2>
  <div>待处理搜索任务：{{status.producer_tasks}}</div>
  <div>taskId 队列长度：{{status.task_queue}}</div>
  <div>生产者线程：{{status.producers_running}}</div>
  <div>消费者线程：{{status.consumers_running}}</div>
  <button @click="fetchStatus">刷新状态</button>
  <button @click="startCrawlers">启动爬虫</button>
  <button @click="stopCrawlers">停止爬虫</button>
  <hr/>
  <h2>日志</h2>
  <table>
     <tr><th>时间</th><th>动作</th><th>关键字</th><th>页</th><th>状态</th><th>详情</th></tr>
     <tr v-for="log in logs" :key="log.id">
        <td>{{log.created_at}}</td><td>{{log.action}}</td><td>{{log.keyword}}</td><td>{{log.page}}</td><td>{{log.status}}</td><td>{{log.details}}</td>
     </tr>
  </table>
  <button @click="loadLogs">刷新日志</button>
</div>
<script>
 new Vue({
   el:'#app',
   data:{task:{keyword:'',page_size:20,pages:1},status:{},logs:[]},
   methods:{
     submitTask(){
       axios.post('/api/task',this.task).then(()=>{alert('已提交');this.fetchStatus();})
     },
     fetchStatus(){axios.get('/api/status').then(r=>this.status=r.data)},
     loadLogs(){axios.get('/api/logs').then(r=>this.logs=r.data)},
     startCrawlers(){axios.post('/api/start',{producers:1,consumers:1}).then(()=>this.fetchStatus())},
     stopCrawlers(){axios.post('/api/stop').then(()=>this.fetchStatus())}
   },
   mounted(){
     this.fetchStatus();this.loadLogs();
   }
 });
</script>
</body>
</html>
